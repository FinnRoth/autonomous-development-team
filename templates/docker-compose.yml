services:
  openclaw:
    build: ./openclaw
    container_name: {{CONTAINER_NAME}}
    restart: unless-stopped

    # Docker-in-Docker: the container runs its own `dockerd` so anything the
    # agents build or run stays inside this container. Requires `privileged`
    # for cgroups / iptables / overlayfs. `docker compose down -v` wipes it all.
    privileged: true

    ports:
      - "{{GATEWAY_PORT}}:18789"

    volumes:
      - ./openclaw/data:/home/node/.openclaw
      # Named volume (Docker-managed, not a host path) backing the in-container
      # docker daemon's image/layer store. Keeps DinD state off the host FS.
      - adt-docker-lib:/var/lib/docker

    environment:
      OPENCLAW_GATEWAY_PASSWORD: "{{OPENCLAW_GATEWAY_PASSWORD}}"
      LITELLM_API_KEY: "{{LITELLM_API_KEY}}"
      LITELLM_BASE_URL: "{{LITELLM_BASE_URL}}"
      # ----- ADT integrations -----
      # Figma personal access token (used by uiux + frontend). Generate at https://www.figma.com/developers/api#access-tokens
      FIGMA_TOKEN: "{{FIGMA_TOKEN}}"
      # Git host: optional `gh` (GitHub) / `glab` (GitLab) / `tea` (Gitea) auth token. Reviewer/Backend/Frontend/QA all share this.
      GIT_HOST_TOKEN: "{{GIT_HOST_TOKEN}}"
      # Git host CLI to use: one of "gh", "glab", "tea". Defaults to "gh".
      GIT_HOST_CLI: "{{GIT_HOST_CLI}}"

    depends_on:
      board-api:
        condition: service_healthy

    networks:
      - adt-internal

  board-api:
    build: ./board-api
    container_name: {{CONTAINER_NAME}}-board-api
    restart: unless-stopped

    ports:
      # Host-side port for local inspection (e.g. curl http://localhost:3001/health).
      # Agents always use the internal hostname http://board-api:3000 — never the host port.
      - "{{BOARD_API_PORT}}:3000"

    volumes:
      # Named volume — SQLite lives here. Never a host path, never inside the openclaw mount.
      - board-api-data:/data

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - adt-internal

networks:
  adt-internal:
    driver: bridge

volumes:
  adt-docker-lib:
  board-api-data:
